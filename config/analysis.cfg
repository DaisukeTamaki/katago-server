# KataGo analysis engine configuration
# See: https://github.com/lightvector/KataGo/blob/master/cpp/configs/analysis_example.cfg

# Search limits
maxVisits = 500
# numAnalysisThreads: positions analyzed in parallel. Increase for throughput
# on powerful GPUs, decrease if running out of memory.
numAnalysisThreads = 4
# numSearchThreadsPerAnalysisThread: MCTS threads per position.
numSearchThreadsPerAnalysisThread = 2

# Max batch size for neural net evaluation.
nnMaxBatchSize = 64

# Neural net cache size (2^N entries). 23 = ~8M entries, ~2-3 GB RAM.
# Decrease if low on memory, increase if you have plenty.
nnCacheSizePowerOfTwo = 23
nnMutexPoolSizePowerOfTwo = 17

# Report winrates from whose perspective
reportAnalysisWinratesAs = BLACK

# Default max moves to report in PV
analysisPVLen = 15

# Wide root noise can improve analysis variety
wideRootNoise = 0.04
